<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include Bootstrap Icons for the padlock icon symbol -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="text-primary">Create Account</h3>
                <p class="text-muted small">Register by filling the following details.</p>
            </div>

            <form name="form1" method="POST" action="register.php" onsubmit="return validate()">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <!-- FIXED: Changed name to 'full_name' to match your register.php key -->
                    <input type="text" class="form-control form-control-lg fs-6" name="full_name" placeholder="John Doe">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">University Email Address</label>
                    <input type="email" class="form-control form-control-lg fs-6" name="email" placeholder="name@university.edu">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg fs-6" name="password" placeholder="Minimum 8 characters">
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" name="phone">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Faculty</label>
                    <input type="text" class="form-control" name="faculty" placeholder="Computing / Business">
                </div>

                
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 fs-6">Register Now</button>
            </form>
            
            <div class="text-center mt-2">
                <span class="text-muted small">Already have an account?</span> 
                <a href="login.html" class="text-decoration-none small fw-bold">Login here</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validate() {
            if (document.form1.full_name.value.length == 0) {
                alert("Name is required!");
                return false;
            }
            if (document.form1.email.value.length == 0||!document.form1.email.value.includes("@") || !document.form1.email.value.includes(".")) {
                alert("Email is required!");
                return false;
            }
            if (document.form1.password.value.length < 8) {
                alert("Password required : should contain a minimum of 8 characters!");
                return false;
            }
            if (document.form1.phone.value.length == 0) {
                alert("Phone number required !");
                return false;
            }
            if (document.form1.phone.value.length > 10 || document.form1.phone.value.length < 10) {
                alert("Invalid Phone number");
                return false;
            }
            if (document.form1.faculty.value.length == 0) {
                alert("Faculty Name required !");
                return false;
            }
            return true; 
        }
    </script>
</body>
</html>
