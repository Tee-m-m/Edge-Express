        <form name="form1" method="POST" action="register.php" onsubmit="return validate()">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="full_name" placeholder="John Doe">
            </div>
            
            <div class="mb-3">
                <label class="form-label">University Email Address</label>
                <input type="email" class="form-control" name="email" placeholder="name@university.edu">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Minimum 8 characters">
            </div>

            <div class="mb-3">
                <label class="form-label">Register As</label>
                <!-- Added custom class to match Bootstrap dropdown styling scales -->
                <select class="form-select form-control" name="role" style="padding-top: 12px;">
                    <option value="student" selected>Student</option>
                    <option value="staff">Staff</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phone_number" placeholder="07XXXXXXXX">
            </div>
            
            <div class="mb-4">
                <label class="form-label">Faculty</label>
                <input type="text" class="form-control" name="faculty" placeholder="Computing / Business / Engineering">
            </div>

            <!-- Changed button class to match your high-utility .btn-premium-login rules -->
            <button type="submit" class="btn btn-premium-login text-white w-100 mb-3">Register Now</button>
        </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validate() {
            if (document.form1.full_name.value.trim().length == 0) {
                alert("Name is required!");
                return false;
            }
            
            var email = document.form1.email.value.trim();
            if (email.length == 0 || !email.includes("@") || !email.includes(".")) {
                alert("Valid email address is required!");
                return false;
            }
            
            if (document.form1.password.value.length == 0) {
                alert("Password required!");
                return false;
            }
            
            // FIXED: Updated target name to match 'phone_number'
            var phone = document.form1.phone_number.value.trim();
            if (phone.length == 0) {
                alert("Phone number required!");
                return false;
            }
            if (phone.length !== 10 || isNaN(phone)) {
                alert("Invalid Phone number! It must be exactly 10 numeric digits.");
                return false;
            }
            
            if (document.form1.faculty.value.trim().length == 0) {
                alert("Faculty Name required!");
                return false;
            }
            return true; 
        }
    </script>
