<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <!-- Bootstrap CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include Bootstrap Icons for the padlock icon symbol -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="mb-4">
                <center><h3>Login</h3></center>
                <p class="small-desc m-0">Log into your favourite cafeteria ! ☕🥐</p>
            </div><br>

            <form name="form2" method="POST" action="login.php" onsubmit="return validateLogin()">
                
                <!-- Email Input Floating Wrapper -->
                <div class="form-floating mb-3">
                    <label for="floatingEmail">Email Address</label><br>
                    <input type="email" class="form-control" id="floatingEmail" name="email" placeholder="name@example.com" value="abc@gmail.com">
                </div>
                
                <!-- Password Input Floating Wrapper -->
                <div class="form-floating mb-2">
                    <label for="floatingPassword">Password</label>
                    <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password">
                </div>

                <!-- Forgot Password Trigger link -->
                <div class="mb-4 text-end">
                    <a href="#" onclick="alert('For university verification, please contact IT administration'); return false;" class="text-decoration-none small text-muted fw-semibold">Forgot Password?</a>
                </div><br>
                
                <!-- Pill Shape Submission Action button containing lock icon icon layout component -->
                <center><button type="submit" class="btn btn-premium-login w-100 mb-4">
                    Sign In <i class="bi bi-lock-fill ms-1"></i>
                </button></center>
            </form>
            
            <div class="text-center footer-text">
                <span>Don't have an account?</span> 
                <a href="register.html" class="footer-link-register">Register here</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS Link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validateLogin() {
            if (document.form2.email.value.length == 0) {
                alert("Email is required!");
                return false;
            }
            if (document.form2.password.value.length == 0) {
                alert("Password is required!");
                return false;
            }
            return true; 
        }
    </script>
</body>
</html>
